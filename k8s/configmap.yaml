apiVersion: v1
kind: ConfigMap
metadata:
  name: kojacoord-config
  namespace: default
data:
  config.toml: |
    [proxy]
    bind = "0.0.0.0:25577"
    online_mode = true
    compression_threshold = 256
    session_timeout_secs = 30
    prevent_proxy_connections = true

    [[servers]]
    name = "lobby"
    address = "lobby-server:25565"
    restricted = false
    backend_type = "vanilla"

    [[servers]]
    name = "survival"
    address = "survival-server:25565"
    restricted = false
    backend_type = "vanilla"

    [database]
    url = "mysql://user:password@mysql-service:3306/kojacoord"
    max_connections = 10

    [anticheat]
    enabled = true
    strict_mode = false

    [server_management]
    enabled = true
    bind = "0.0.0.0:8080"
    auth_token = "CHANGE_THIS_TOKEN_IN_PRODUCTION"

    [http_api]
    enabled = true
    bind = "0.0.0.0:8081"
    auth_token = "CHANGE_THIS_TOKEN_IN_PRODUCTION"

    [cluster]
    enabled = false
    node_id = "kojacoord-proxy-1"
    discovery_enabled = false

    [metrics]
    enabled = true
    bind = "0.0.0.0:9090"

    [plugins]
    enabled = true
    directory = "/app/plugins"
    auto_load = true
