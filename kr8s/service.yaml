# Public-facing Service — Minecraft traffic ONLY. `server-mgmt` (8080) used to
# be listed here too, which on any cloud provider's LoadBalancer controller
# puts it directly on the internet, protected by nothing but the token —
# directly contradicting `configmap.yaml`'s own comment that it should only be
# reachable "from trusted backends". It stays available cluster-internally via
# `kojacoord-proxy-internal` below. (The admin HTTP API this comment used to
# also mention has been removed entirely — the proxy holds no persistent
# state and exposes no inbound HTTP/REST surface by design.)
apiVersion: v1
kind: Service
metadata:
  name: kojacoord-proxy
  namespace: kojacoord-system
  labels:
    app: kojacoord-proxy
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  ports:
  - name: minecraft
    port: 25577
    targetPort: 25577
    protocol: TCP
  selector:
    app: kojacoord-proxy
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
---
apiVersion: v1
kind: Service
metadata:
  name: kojacoord-proxy-internal
  namespace: kojacoord-system
  labels:
    app: kojacoord-proxy
spec:
  type: ClusterIP
  ports:
  - name: minecraft
    port: 25577
    targetPort: 25577
    protocol: TCP
  - name: server-mgmt
    port: 8080
    targetPort: 8080
    protocol: TCP
  selector:
    app: kojacoord-proxy
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
