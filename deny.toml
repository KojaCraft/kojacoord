# cargo-deny configuration — supply-chain policy for the workspace.
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
# Check the targets we actually ship for. Keeps the dependency graph (and thus
# the audit surface) scoped to real build targets.
targets = [
  "x86_64-unknown-linux-gnu",
  "aarch64-unknown-linux-gnu",
  "x86_64-pc-windows-msvc",
  "x86_64-apple-darwin",
  "aarch64-apple-darwin",
]
all-features = true

[advisories]
# RUSTSEC advisory database checks (the cargo-audit data source).
version = 2
# Fail the build on any vulnerability; downgrade specific ones here if needed.
yanked = "warn"
ignore = [
  # --- wasmtime 15.0.1 (transitive / pinned) ---
  { id = "RUSTSEC-2024-0438", reason = "wasmtime 15.0.1 — pinned transitive dependency, no upgrade path without breaking plugin runtime API" },
  { id = "RUSTSEC-2024-0442", reason = "wasmtime-jit-debug 15.0.1 — internal-only crate, not used directly" },
  { id = "RUSTSEC-2025-0046", reason = "wasmtime 15.0.1 — pinned transitive dependency" },
  { id = "RUSTSEC-2025-0118", reason = "wasmtime 15.0.1 — pinned transitive dependency" },
  { id = "RUSTSEC-2026-0020", reason = "wasmtime 15.0.1 — pinned transitive dependency" },
  { id = "RUSTSEC-2026-0021", reason = "wasmtime 15.0.1 — pinned transitive dependency" },
  { id = "RUSTSEC-2026-0085", reason = "wasmtime 15.0.1 — pinned transitive dependency" },
  { id = "RUSTSEC-2026-0086", reason = "wasmtime 15.0.1 — pinned transitive dependency" },
  { id = "RUSTSEC-2026-0087", reason = "wasmtime 15.0.1 — pinned transitive dependency" },
  { id = "RUSTSEC-2026-0088", reason = "wasmtime 15.0.1 — pinned transitive dependency" },
  { id = "RUSTSEC-2026-0089", reason = "wasmtime 15.0.1 — pinned transitive dependency" },
  { id = "RUSTSEC-2026-0091", reason = "wasmtime 15.0.1 — pinned transitive dependency" },
  { id = "RUSTSEC-2026-0092", reason = "wasmtime 15.0.1 — pinned transitive dependency" },
  { id = "RUSTSEC-2026-0093", reason = "wasmtime 15.0.1 — pinned transitive dependency" },
  { id = "RUSTSEC-2026-0094", reason = "wasmtime 15.0.1 — pinned transitive dependency" },
  { id = "RUSTSEC-2026-0095", reason = "wasmtime 15.0.1 — pinned transitive dependency" },
  { id = "RUSTSEC-2026-0096", reason = "wasmtime 15.0.1 — pinned transitive dependency" },
  { id = "RUSTSEC-2026-0149", reason = "wasmtime-wasi 15.0.1 — pinned transitive dependency" },
 
  # --- rustls-webpki (transitive, no patch in version range yet) ---
  { id = "RUSTSEC-2026-0049", reason = "rustls-webpki 0.102.8 — transitive dependency, patch requires breaking upstream bump" },
  { id = "RUSTSEC-2026-0098", reason = "rustls-webpki 0.102.8 — transitive dependency, patch requires breaking upstream bump" },
  { id = "RUSTSEC-2026-0099", reason = "rustls-webpki 0.102.8 — transitive dependency, patch requires breaking upstream bump" },
  { id = "RUSTSEC-2026-0104", reason = "rustls-webpki 0.102.8 — transitive dependency, patch requires breaking upstream bump" },
 
  # --- Other pinned / no-patch vulnerabilities ---
  { id = "RUSTSEC-2023-0071", reason = "rsa 0.9.10 — Marvin Attack, no patch available yet; local use only" },
  { id = "RUSTSEC-2024-0437", reason = "protobuf 2.28.0 — pinned transitive dependency" },
  { id = "RUSTSEC-2024-0445", reason = "cap-primitives 2.0.2 — pinned transitive dependency" },
 
  # --- Unmaintained (no security impact) ---
  { id = "RUSTSEC-2020-0168", reason = "mach 0.3.2 — unmaintained, no direct security impact" },
  { id = "RUSTSEC-2024-0436", reason = "paste 1.0.15 — unmaintained, no direct security impact" },
  { id = "RUSTSEC-2025-0057", reason = "fxhash 0.2.1 — unmaintained, no direct security impact" },
  { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile 2.2.0 — unmaintained, thin wrapper around rustls-pki-types" },
  { id = "RUSTSEC-2025-0141", reason = "bincode 1.3.3 — unmaintained, team considers it complete" },
]

[licenses]
version = 2
# Allowlist of licenses we accept for dependencies. Add to this list
# deliberately rather than relaxing the confidence threshold.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "Zlib",
  "MPL-2.0",
  "CC0-1.0",
  "OpenSSL",
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
# Some crates ship licenses only via a file; record clarifications here as needed.
exceptions = []

[bans]
# Duplicate versions bloat the binary and widen the audit surface, but are common
# in large trees — warn rather than fail so it stays actionable, not blocking.
multiple-versions = "warn"
# wildcard-dependencies = "deny"
# Crates we never want pulled in (add known-bad/unwanted crates here).
deny = []

[sources]
# Only allow dependencies from crates.io; flag anything from an unknown registry
# or git source so a supply-chain swap can't slip in unnoticed.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
