name: Auto-tag

# Push a `v<version>` tag whenever the workspace `version` in the root
# `Cargo.toml` changes on the default branch. That tag is what
# `release.yml` listens for — so bumping the version and merging to
# master is enough to cut a full multi-OS release without manual git
# tagging.
#
# Idempotent: if the tag already exists (e.g. the same version is
# committed twice), the job is a no-op. Skipped tags are logged.

on:
  push:
    branches:
      - master
      - main
    paths:
      # Limit the trigger to actual version-bearing files so unrelated
      # commits to master don't even spin up the runner.
      - 'Cargo.toml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag:
    name: Tag new workspace version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history + tags so we can compare against existing
          # tags without an extra `git fetch --tags` round-trip.
          fetch-depth: 0

      - name: Read workspace version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          # Pull `version = "x.y.z"` from `[workspace.package]` —
          # avoids spinning up cargo just to read one string. The
          # workspace section sits between `[workspace.package]` and
          # the NEXT top-level `[section]` header, so we slice with
          # awk and grep the version line out of that window.
          VERSION=$(awk '
              /^\[workspace\.package\]/ { in_section=1; next }
              in_section && /^\[/        { in_section=0 }
              in_section && /^version[[:space:]]*=/ {
                  match($0, /"[^"]+"/);
                  v=substr($0, RSTART+1, RLENGTH-2);
                  print v;
                  exit
              }
          ' Cargo.toml)
          if [ -z "$VERSION" ]; then
              echo "::error::Could not parse workspace version from Cargo.toml"
              exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected workspace version: $VERSION"

      - name: Create tag if it doesn't already exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "Tag $TAG already exists locally — nothing to do."
              exit 0
          fi
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
              echo "Tag $TAG already exists on remote — nothing to do."
              exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Annotated tag carries the version in its message so the
          # downstream `release.yml` and any consumers (homebrew tap
          # update, container registry tag list, etc.) see a clean
          # provenance record.
          git tag -a "$TAG" -m "Release ${VERSION} (auto-tagged from $(git rev-parse --short HEAD))"
          git push origin "$TAG"

          echo "Pushed tag $TAG → release.yml will now build & publish."
