apiVersion: v1
kind: Service
metadata:
  name: kojacoord-proxy
  namespace: default
  labels:
    app: kojacoord-proxy
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  ports:
  - name: minecraft
    port: 25577
    targetPort: 25577
    protocol: TCP
  - name: server-mgmt
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: http-api
    port: 8081
    targetPort: 8081
    protocol: TCP
  selector:
    app: kojacoord-proxy
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
---
apiVersion: v1
kind: Service
metadata:
  name: kojacoord-proxy-internal
  namespace: default
  labels:
    app: kojacoord-proxy
spec:
  type: ClusterIP
  ports:
  - name: minecraft
    port: 25577
    targetPort: 25577
    protocol: TCP
  - name: server-mgmt
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: http-api
    port: 8081
    targetPort: 8081
    protocol: TCP
  selector:
    app: kojacoord-proxy
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
