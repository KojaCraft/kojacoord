[proxy]
bind = "0.0.0.0:25565"
online_mode = true
compression_threshold = 256
max_players = 1000
prevent_proxy_connections = false
session_timeout_secs = 5
# Coalesce S->C packet writes when several are already buffered together
# (chunk bursts, teleports) instead of one write+flush per packet. Purely a
# wire-syscall optimization, transparent to clients; set false to instantly
# revert to the old per-packet-flush behavior.
batch_s2c_writes = true
mojang_public_key = ""

[listeners]
motd = "KojacoordNetwork"
# Optional: Use JSON text component for colored/styled MOTD
# Example: motd_json = { text = "KojacoordNetwork", color = "gold", bold = true }
# motd_json = """["", {"text": "Kojacoord", "color": "gold"}, {"text": "Network", "color": "yellow"}]"""
# Optional: Server lore displayed in player hover/sample
# server_lore = "Welcome to our server!"
tab_list = "GLOBAL_PING"

# Player-info forwarding to backends.
#   none       - no forwarding (default; safest)
#   velocity   - modern, HMAC-signed forwarding. REQUIRES a strong velocity_secret
#                that matches the backend's forwarding.secret.
#   bungeecord - legacy, UNSIGNED forwarding. Backends MUST be firewalled so they
#                only accept connections from this proxy, otherwise players can
#                spoof identities.
[forwarding]
mode = "none"
# Generate with e.g. `openssl rand -hex 32` and copy it to the backend.
velocity_secret = ""

# Region-aware lobby selection (picks the closest online lobby by IP
# geolocation). Optional: leave database_path empty to skip it entirely —
# every player then buckets to the "global" region, same as if this whole
# section were omitted. Point it at a MaxMind GeoLite2 Country or City .mmdb
# (free account required at https://www.maxmind.com) to enable it; City-level
# databases additionally split North America into us-east/us-west.
[geoip]
database_path = ""

# IP reputation / hosting-provider blocklist, checked on every accepted TCP
# connection before any per-connection work starts. blocklist_cidrs is always
# available with zero I/O; provider_url is optional and, if set, has the
# proxy make an outbound GET to that URL (expecting a JSON {"blocked": bool}
# body) — a slow/unreachable provider fails OPEN (connection allowed) rather
# than stalling new connections.
[ip_reputation]
blocklist_cidrs = []
provider_url = ""
api_key = ""
cache_ttl_secs = 3600
timeout_ms = 300

# Built-in maintenance mode. `enabled` here is only the boot-time default —
# flip it live (no restart, no file edit) via the TCP server-management
# control-plane's MaintenanceToggle command. bypass_uuids lets staff/testers
# still log in while it's on.
[maintenance]
enabled = false
kick_message = "The network is currently down for maintenance. Please check back soon."
bypass_uuids = []

# Full-server connection queueing. When a [[servers]] entry's max_players is
# reached, a connecting player is held in limbo with a live "Position in
# queue" message instead of being rejected, and let through in arrival order
# as slots free up. max_queue_size = 0 means unlimited.
[queue]
enabled = true
max_queue_size = 0

# GameSpy4 (UT3) query protocol — the same enable-query/query.port protocol
# vanilla servers speak, so third-party server-list aggregators that ping
# via UDP query (not the normal Java status ping) see this proxy correctly.
# Off by default: opening another UDP listener is a deliberate choice.
[query]
enabled = false
bind = "0.0.0.0:25565"

# Anonymous, opt-out usage telemetry. When enabled, the proxy periodically sends
# coarse, non-identifying metrics (version, OS/arch, peak players, backend count)
# to help us understand adoption. No IPs, hostnames, server names or player
# identities are ever sent. Set enabled = false to disable completely — the
# endpoint is then never contacted.
[telemetry]
enabled = true
endpoint = "https://metric.kojacoord.net"
interval_secs = 1800

[[servers]]
name = "lobby"
address = "127.0.0.1:25566"
restricted = false
# backend_type = "spigot"  # Options: spigot (default), forge, hybrid
# --- Shown in the KojaCraft client server selector ---
display_name = "Lobby"
motd = "The KojaCraft hub — pick a game to play!"
game_type = "lobby"
# modpack = "kojacraft"
# modpack_version = "1.0.0"
# max_players = 200

[[servers]]
name = "survival"
address = "127.0.0.1:25567"
backend_type = "spigot"  # Options: spigot (default), forge, hybrid
display_name = "Survival"
motd = "Hardcore survival with custom mechanics"
game_type = "survival"
modpack = "kojacraft"
modpack_version = "1.0.0"
max_players = 100
# weight = 1  # Relative weight for [[server_groups]] "weighted" selection — see below

# Named backend pools: reference "survival-pool" as a [[routing.rules]]
# target (or as `routing.default_server`) instead of one literal server
# name, and the proxy picks a member per `strategy`:
#   least_connections (default) | weighted (uses each member's `weight`
#   above) | latency (prefers the member with the lowest measured
#   health-probe TCP-connect latency; requires health_probe_interval_secs >
#   0 on the members — an unmeasured member is never preferred over a
#   measured one).
# [[server_groups]]
# name = "survival-pool"
# members = ["survival", "survival-2"]
# strategy = "least_connections"
