# Rust formatter configuration for Kojacoord Proxy
# Note: This configuration uses only stable rustfmt options compatible with stable Rust

# Maximum line width
max_width = 100

# Hard tabs or spaces
hard_tabs = false
tab_spaces = 4

# Edition
edition = "2021"

# Imports
reorder_imports = true

# Match blocks
match_block_trailing_comma = true

# Misc
use_field_init_shorthand = true
use_try_shorthand = true
force_explicit_abi = true
