apiVersion: apps/v1
kind: Deployment
metadata:
  name: kojacoord-proxy
  namespace: kojacoord-system
  labels:
    app: kojacoord-proxy
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kojacoord-proxy
  template:
    metadata:
      labels:
        app: kojacoord-proxy
        version: v1
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
      - name: kojacoord-proxy
        image: kojacoord/proxy:latest
        imagePullPolicy: IfNotPresent
        # `namespace.yaml` enforces the `restricted` Pod Security Standard on
        # kojacoord-system, which REQUIRES allowPrivilegeEscalation: false, all
        # capabilities dropped, and a seccomp profile — without these the
        # admission controller rejects this pod outright. None of them cost the
        # proxy anything: it's a plain TCP/HTTP service, doesn't need to escalate
        # privileges, use raw sockets, or run custom seccomp syscalls.
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
        ports:
        - name: minecraft
          containerPort: 25577
          protocol: TCP
        - name: server-mgmt
          containerPort: 8080
          protocol: TCP
        env:
        - name: RUST_LOG
          value: "info"
        # Control-plane tokens are injected from a Secret as KOJA_*__* env
        # vars, which override the TOML config at startup.
        envFrom:
        - secretRef:
            name: kojacoord-secrets
        volumeMounts:
        - name: config
          mountPath: /app/config.toml
          subPath: config.toml
        - name: plugins
          mountPath: /app/plugins
        - name: logs
          mountPath: /app/logs
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        # The proxy has no inbound HTTP surface to probe (see
        # `services/http_api.rs` removal — it's a pure TCP relay), so a raw
        # TCP-connect check against the Minecraft port is the only
        # universally-available liveness signal.
        livenessProbe:
          tcpSocket:
            port: 25577
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 25577
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: config
        configMap:
          name: kojacoord-config
      - name: plugins
        persistentVolumeClaim:
          claimName: kojacoord-plugins
      - name: logs
        persistentVolumeClaim:
          claimName: kojacoord-logs
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - kojacoord-proxy
              topologyKey: kubernetes.io/hostname
      restartPolicy: Always
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kojacoord-plugins
  namespace: kojacoord-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kojacoord-logs
  namespace: kojacoord-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: standard
